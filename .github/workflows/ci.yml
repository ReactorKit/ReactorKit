name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS: swift test runs ALL tests including macro expansion tests.
  # This is the only reliable way to test Swift macro packages — xcodebuild
  # has known issues resolving swift-syntax for macro targets.
  macos:
    name: macOS (swift test)
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run tests
        run: swift test

  # iOS / tvOS: xcodebuild with ReactorKitSwiftUI scheme.
  # Builds ReactorKitSwiftUI to verify compilation on simulator SDKs.
  # Macro expansion tests and observation unit tests run on macOS only.
  xcodebuild:
    name: ${{ matrix.platform }}
    runs-on: macOS-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            sdk: iphonesimulator
            scheme: ReactorKitSwiftUI
          - platform: tvOS
            sdk: appletvsimulator
            scheme: ReactorKitSwiftUI

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Select iOS Simulator dynamically
        if: matrix.sdk == 'iphonesimulator'
        run: |
          OS_VERSION=$(xcrun simctl list runtimes | grep 'iOS' | grep -oE '[0-9]+\.[0-9]+' | sort -Vr | head -n1)
          DEVICE_NAME=$(xcrun simctl list devices | grep -A 20 "^-- iOS $OS_VERSION --" | grep -E '^ *iPhone [0-9]+ \(' | grep -v 'Pro\|Plus\|SE\|unavailable' | sed -E 's/^[[:space:]]*([^()]+) \(.*/\1/' | sort -t' ' -k2 -n -r | head -n1)
          echo "Using simulator: $DEVICE_NAME (iOS $OS_VERSION)"
          echo "DESTINATION=platform=iOS Simulator,name=$DEVICE_NAME,OS=$OS_VERSION" >> $GITHUB_ENV

      - name: Set tvOS destination
        if: matrix.sdk == 'appletvsimulator'
        run: echo "DESTINATION=platform=tvOS Simulator,name=Apple TV,OS=latest" >> $GITHUB_ENV

      - name: Build
        run: |
          set -o pipefail && xcodebuild build \
            -scheme "${{ matrix.scheme }}" \
            -sdk "${{ matrix.sdk }}" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO | xcpretty -c;
